<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0F1C2E"/>

  <!-- Chip body -->
  <rect x="8" y="8" width="16" height="16" rx="2" fill="#2B7FD4"/>

  <!-- Pins — top -->
  <rect x="11" y="5" width="2" height="3" rx="0.5" fill="#2B7FD4"/>
  <rect x="15" y="5" width="2" height="3" rx="0.5" fill="#2B7FD4"/>
  <rect x="19" y="5" width="2" height="3" rx="0.5" fill="#2B7FD4"/>

  <!-- Pins — bottom -->
  <rect x="11" y="24" width="2" height="3" rx="0.5" fill="#2B7FD4"/>
  <rect x="15" y="24" width="2" height="3" rx="0.5" fill="#2B7FD4"/>
  <rect x="19" y="24" width="2" height="3" rx="0.5" fill="#2B7FD4"/>

  <!-- Pins — left -->
  <rect x="5" y="11" width="3" height="2" rx="0.5" fill="#2B7FD4"/>
  <rect x="5" y="15" width="3" height="2" rx="0.5" fill="#2B7FD4"/>
  <rect x="5" y="19" width="3" height="2" rx="0.5" fill="#2B7FD4"/>

  <!-- Pins — right -->
  <rect x="24" y="11" width="3" height="2" rx="0.5" fill="#2B7FD4"/>
  <rect x="24" y="15" width="3" height="2" rx="0.5" fill="#2B7FD4"/>
  <rect x="24" y="19" width="3" height="2" rx="0.5" fill="#2B7FD4"/>

  <!-- ECG / pulse line -->
  <polyline
    points="9,16 11,16 12.5,11 14,21 15.5,16 23,16"
    fill="none" stroke="white" stroke-width="1.5"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
